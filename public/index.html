<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Posting Suggestion Agent</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fb;
        --panel: #ffffff;
        --ink: #1d2433;
        --muted: #637083;
        --line: #d8dee8;
        --primary: #0f766e;
        --primary-dark: #115e59;
        --accent: #b45309;
        --code: #111827;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        line-height: 1.5;
      }

      header {
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }

      .shell {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        min-height: 72px;
      }

      h1,
      h2 {
        margin: 0;
        letter-spacing: 0;
      }

      h1 {
        font-size: 24px;
        font-weight: 720;
      }

      h2 {
        font-size: 18px;
      }

      main {
        padding: 28px 0;
      }

      .status {
        color: var(--accent);
        font-size: 14px;
        font-weight: 650;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(320px, 0.8fr);
        gap: 20px;
        align-items: start;
      }

      section {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        min-width: 0;
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 16px 18px;
        border-bottom: 1px solid var(--line);
      }

      .panel-body {
        padding: 18px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 14px;
        font-weight: 650;
      }

      textarea {
        width: 100%;
        min-height: 420px;
        margin: 0;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fbfcfe;
        color: var(--code);
        font: 14px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      textarea {
        resize: vertical;
        padding: 14px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 14px;
      }

      button {
        min-height: 40px;
        border: 1px solid transparent;
        border-radius: 6px;
        padding: 0 14px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button.primary {
        background: var(--primary);
        color: #ffffff;
      }

      button.primary:hover {
        background: var(--primary-dark);
      }

      button.secondary {
        border-color: var(--line);
        background: #ffffff;
        color: var(--ink);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.65;
      }

      .notice {
        margin-top: 12px;
        color: var(--muted);
        font-size: 14px;
      }

      @media (max-width: 860px) {
        .workspace {
          grid-template-columns: 1fr;
        }

        textarea,
        textarea {
          min-height: 300px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="shell topbar">
        <h1>Posting Suggestion Agent</h1>
        <div class="status">First-run AI suggestions</div>
      </div>
    </header>

    <main class="shell">
      <div class="workspace">
        <section aria-labelledby="cases-heading">
          <div class="panel-head">
            <h2 id="cases-heading">Unresolved cases</h2>
          </div>
          <div class="panel-body">
            <label for="cases-input">JSON input</label>
            <textarea id="cases-input" spellcheck="false"></textarea>
            <div class="actions">
              <button class="primary" id="run-button" type="button">Create suggestions</button>
              <button class="secondary" id="sample-button" type="button">Load sample</button>
            </div>
            <div class="notice" id="input-status" role="status"></div>
          </div>
        </section>

        <section aria-labelledby="response-heading">
          <div class="panel-head">
            <h2 id="response-heading">Response</h2>
          </div>
          <div class="panel-body">
            <textarea id="response-output" spellcheck="false">{}</textarea>
            <div class="actions">
              <button class="secondary" id="accept-button" type="button">Store accepted postings</button>
            </div>
            <div class="notice" id="response-status" role="status"></div>
          </div>
        </section>
      </div>
    </main>

    <script>
      const casesInput = document.querySelector("#cases-input");
      const responseOutput = document.querySelector("#response-output");
      const inputStatus = document.querySelector("#input-status");
      const responseStatus = document.querySelector("#response-status");
      const runButton = document.querySelector("#run-button");
      const sampleButton = document.querySelector("#sample-button");
      const acceptButton = document.querySelector("#accept-button");

      const sampleCases = {
        cases: [
          {
            id: "case_001",
            transaction: {
              id: "tx_001",
              source: "bank",
              booking_date: "2026-01-18",
              counterparty_name: "Amazon Payments Europe",
              purpose: "Amazon Business Rechnung DE-2026-001",
              amount: -119,
              currency: "EUR"
            },
            candidate_receipts: [
              {
                id: "rcpt_001",
                type: "incoming_invoice",
                supplier_name: "Amazon Business",
                invoice_number: "DE-2026-001",
                invoice_date: "2026-01-15",
                currency: "EUR",
                gross_amount: 119,
                net_amount: 100,
                vat_amount: 19,
                vat_rate: 19,
                description: "Buerobedarf: Druckerpapier und Stifte",
                ocr_text: "Amazon Business Rechnung DE-2026-001 Buerobedarf 119,00 EUR inkl. 19% MwSt"
              }
            ]
          }
        ],
        accounts: [
          {
            code: "4930",
            name: "Buerobedarf",
            type: "expense",
            description: "Bueromaterial und kleinere Arbeitsmittel",
            examples: ["druckerpapier", "stifte", "buerobedarf"]
          },
          {
            code: "4600",
            name: "Werbekosten",
            type: "expense",
            description: "Werbung und Marketingaufwendungen",
            examples: ["google ads", "facebook ads", "online marketing"]
          }
        ]
      };

      function setResponse(value) {
        responseOutput.value = JSON.stringify(value, null, 2);
      }

      function describeRequestError(error) {
        if (error.name === "AbortError") {
          return "Request timed out. Check Worker logs for the matching request.";
        }

        return error.message || "Request failed.";
      }

      function parseInput() {
        try {
          inputStatus.textContent = "";
          return JSON.parse(casesInput.value);
        } catch {
          inputStatus.textContent = "Invalid JSON.";
          return undefined;
        }
      }

      function parseResponse() {
        try {
          responseStatus.textContent = "";
          return JSON.parse(responseOutput.value);
        } catch {
          responseStatus.textContent = "Response JSON is invalid.";
          return undefined;
        }
      }

      async function postJson(path, payload, timeoutMs = 55000) {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => {
          controller.abort();
        }, timeoutMs);

        try {
          const response = await fetch(path, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(payload),
            signal: controller.signal
          });

          const requestId = response.headers.get("X-Request-Id");
          let body;

          try {
            body = await response.json();
          } catch {
            body = {
              success: false,
              error: {
                code: "INVALID_RESPONSE",
                message: "The server did not return JSON."
              }
            };
          }

          return {
            ok: response.ok,
            status: response.status,
            requestId,
            body
          };
        } finally {
          clearTimeout(timeoutId);
        }
      }

      sampleButton.addEventListener("click", () => {
        casesInput.value = JSON.stringify(sampleCases, null, 2);
        inputStatus.textContent = "";
      });

      runButton.addEventListener("click", async () => {
        const payload = parseInput();
        if (!payload) {
          return;
        }

        runButton.disabled = true;
        responseStatus.textContent = "Creating suggestion run.";

        try {
          const result = await postJson("/api/suggestion-runs", payload);
          setResponse(result.body);
          responseStatus.textContent = result.ok
            ? `Suggestion run received. Request ID: ${result.requestId ?? "not provided"}.`
            : `Request failed with HTTP ${result.status}. Request ID: ${result.requestId ?? "not provided"}.`;
        } catch (error) {
          setResponse({
            success: false,
            error: {
              code: error.name === "AbortError" ? "REQUEST_TIMEOUT" : "REQUEST_FAILED",
              message: describeRequestError(error)
            }
          });
          responseStatus.textContent = describeRequestError(error);
        } finally {
          runButton.disabled = false;
        }
      });

      acceptButton.addEventListener("click", async () => {
        const payload = parseResponse();
        if (!payload) {
          return;
        }

        acceptButton.disabled = true;
        responseStatus.textContent = "Storing accepted postings.";

        try {
          const result = await postJson("/api/accepted-postings", payload);
          setResponse(result.body);
          responseStatus.textContent = result.ok
            ? `Accepted-posting response received. Request ID: ${result.requestId ?? "not provided"}.`
            : `Request failed with HTTP ${result.status}. Request ID: ${result.requestId ?? "not provided"}.`;
        } catch (error) {
          setResponse({
            success: false,
            error: {
              code: error.name === "AbortError" ? "REQUEST_TIMEOUT" : "REQUEST_FAILED",
              message: describeRequestError(error)
            }
          });
          responseStatus.textContent = describeRequestError(error);
        } finally {
          acceptButton.disabled = false;
        }
      });

      casesInput.value = JSON.stringify(sampleCases, null, 2);
    </script>
  </body>
</html>
